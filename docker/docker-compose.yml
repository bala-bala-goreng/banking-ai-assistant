name: banking-ai-assistant

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bank-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bankdb}
      POSTGRES_USER: ${POSTGRES_USER:-bank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bank}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bank} -d ${POSTGRES_DB:-bankdb}"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ../backend
    container_name: bank-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bankdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bank}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bank}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-0123456789abcdef}
      # Phase 2+: point Spring AI at Ollama (host install or the `ai` profile below)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - "8080:8080"

  # Phase 2+ — start with: docker compose --profile ai up
  # With a GPU, installing Ollama on the host is usually faster (see README §2);
  # then set OLLAMA_BASE_URL=http://host.docker.internal:11434 in .env instead.
  ollama:
    image: ollama/ollama:latest
    container_name: bank-ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  pgdata:
  ollama:
